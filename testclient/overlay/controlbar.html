<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LiveTalking 控制条</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="controlbar">
  <div id="toolbar">
    <button id="drag" title="拖动">::</button>
    <button id="toggleInteraction" title="切换穿透">穿透</button>
    <button id="zoomOut" title="缩小">-</button>
    <button id="zoomReset" title="重置缩放">100%</button>
    <button id="zoomIn" title="放大">+</button>
    <button id="reconnect" title="重连">↻</button>
    <button id="minimize" title="最小化">_</button>
    <button id="close" title="关闭">x</button>
  </div>
  <script src="controlbar.js"></script>
</body>
</html>
